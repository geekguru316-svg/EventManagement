<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Georgia, "Times New Roman", serif; background: linear-gradient(180deg, #fff8ef 0%, #f2e9dd 100%); color: #1f2933; }
        .panel { width: min(520px, calc(100vw - 32px)); background: #fffdf8; border: 1px solid #eadfcd; border-radius: 24px; padding: 40px; box-shadow: 0 20px 50px rgba(82, 96, 109, 0.08); }
        h1 { margin: 0 0 12px; font-size: 2.2rem; }
        p, label { color: #52606d; line-height: 1.6; }
        .intro { max-width: 420px; }
        .message, .errors, form { width: min(100%, 420px); margin-left: auto; margin-right: auto; }
        form { margin-top: 24px; display: flex; flex-direction: column; align-items: center; }
        form p { width: 100%; margin: 0 0 18px; }
        form label { display: block; margin-bottom: 4px; }
        input { width: 100%; margin-top: 6px; padding: 12px 14px; border: 1px solid #d9c7af; border-radius: 12px; background: #fff; font: inherit; }
        button { min-width: 160px; border: 0; border-radius: 999px; background: #9c4221; color: #fff; padding: 12px 18px; font: inherit; cursor: pointer; margin-top: 8px; }
        .message { margin-bottom: 16px; padding: 12px 14px; border-radius: 12px; background: #fef3c7; color: #92400e; }
        .errors { margin-bottom: 16px; padding: 12px 14px; border-radius: 12px; background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <main class="panel">
        <h1>Login</h1>
        <p class="intro">Sign in with an existing account to access the event management modules.</p>
        {% if messages %}
            {% for message in messages %}
                <div class="message">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% if form.non_field_errors %}
            <div class="errors">{{ form.non_field_errors }}</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Sign in</button>
        </form>
    </main>
</body>
</html>
